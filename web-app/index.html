<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabula Web</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
      }

      .tabula-loading-shell {
        align-items: center;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        padding: 32px;
      }

      .tabula-loading {
        align-items: center;
        display: flex;
        flex-direction: column;
        gap: 18px;
        text-align: center;
      }

      .tabula-loading-mark {
        animation: tabula-loading-pulse 1.6s ease-in-out infinite;
        background: #1f6feb;
        border-radius: 8px;
        box-shadow:
          0 0 0 8px rgba(31, 111, 235, 0.1),
          0 18px 40px rgba(15, 23, 42, 0.14);
        height: 48px;
        position: relative;
        width: 48px;
      }

      .tabula-loading-mark::before,
      .tabula-loading-mark::after {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 999px;
        content: "";
        left: 12px;
        position: absolute;
        right: 12px;
      }

      .tabula-loading-mark::before {
        height: 4px;
        top: 15px;
      }

      .tabula-loading-mark::after {
        bottom: 15px;
        height: 4px;
      }

      .tabula-loading-title {
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: 0;
        margin: 0;
      }

      .tabula-loading-copy {
        color: #475569;
        font-size: 0.95rem;
        line-height: 1.5;
        margin: 0;
        max-width: 280px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          background: #0f172a;
          color: #e2e8f0;
        }

        .tabula-loading-copy {
          color: #94a3b8;
        }

        .tabula-loading-mark {
          box-shadow:
            0 0 0 8px rgba(31, 111, 235, 0.18),
            0 18px 40px rgba(0, 0, 0, 0.35);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .tabula-loading-mark {
          animation: none;
        }
      }

      @keyframes tabula-loading-pulse {
        0%,
        100% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.06);
        }
      }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root">
      <main class="tabula-loading-shell" aria-live="polite">
        <section class="tabula-loading" aria-label="Loading Tabula">
          <div class="tabula-loading-mark" aria-hidden="true"></div>
          <h1 class="tabula-loading-title">Tabula Web</h1>
          <p class="tabula-loading-copy">Loading your workspace...</p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
